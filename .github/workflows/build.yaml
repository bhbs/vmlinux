name: build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            dwarves \
            pahole \
            cpio \
            rsync \
            wget \
            xz-utils

      - name: Download Linux kernel source
        run: |
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.30.tar.xz
          tar -xf linux-6.12.30.tar.xz

      - name: Configure kernel
        working-directory: linux-6.12.30
        run: |
          make defconfig

          # Firecracker / virtio
          scripts/config --enable CONFIG_KVM_GUEST
          scripts/config --enable CONFIG_VIRTIO
          scripts/config --enable CONFIG_VIRTIO_MMIO
          scripts/config --enable CONFIG_VIRTIO_BLK
          scripts/config --enable CONFIG_VIRTIO_NET
          scripts/config --enable CONFIG_VSOCKETS
          scripts/config --enable CONFIG_VIRTIO_VSOCKETS

          # RNG
          scripts/config --enable CONFIG_HW_RANDOM
          scripts/config --enable CONFIG_HW_RANDOM_VIRTIO

          # Basic systems
          scripts/config --enable CONFIG_DEVTMPFS
          scripts/config --enable CONFIG_DEVTMPFS_MOUNT
          scripts/config --enable CONFIG_TMPFS
          scripts/config --enable CONFIG_PROC_FS
          scripts/config --enable CONFIG_SYSFS

          # App/container workloads
          scripts/config --enable CONFIG_CGROUPS
          scripts/config --enable CONFIG_NAMESPACES
          scripts/config --enable CONFIG_OVERLAY_FS

          # Enable IP autoconfiguration support
          scripts/config --enable CONFIG_IP_PNP

          make olddefconfig

      - name: Build kernel
        working-directory: linux-6.12.30
        run: |
          make -j$(nproc)

      - name: Prepare artifacts
        run: |
          mkdir out

          cp linux-6.12.30/vmlinux \
            out/vmlinux-6.12.30-firecracker

          file out/vmlinux-6.12.30-firecracker

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/vmlinux-6.12.30-firecracker
